<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIMIDICE - 3D Dice Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
            user-select: none;
        }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            z-index: 200;
        }
        
        /* タイトル画面のスタイル */
        #titleScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(26, 26, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
            /* ロード完了までは非表示 */
            display: none; 
        }
        .title-text {
            /* 変更: 画面幅に応じて文字サイズを自動縮小し、見切れを防ぐ */
            font-size: min(10vw, 100px); 
            color: #fff;
            font-weight: bold;
            /* 変更: 文字間隔も画面幅に合わせる */
            letter-spacing: min(1.5vw, 15px); 
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(217, 83, 79, 0.8);
        }
        .start-text {
            font-size: 24px;
            color: #ccc;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        #ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            display: none;
            z-index: 50;
        }
        #rollBtn {
            pointer-events: auto;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background-color: #d9534f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: background-color 0.2s;
        }
        #rollBtn:hover { background-color: #c9302c; }
        #instruction {
            color: #ccc;
            margin-top: 10px;
            font-size: 16px;
        }
        #resultText {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            /* 変更: 画面幅に応じて文字サイズを自動縮小し、見切れを防ぐ */
            font-size: min(13vw, 100px); 
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            display: none;
            z-index: 50;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes popIn {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
            100% { filter: drop-shadow(0 0 30px rgba(255,255,0,1)); }
        }
        .show-gray {
            display: block !important;
            color: #888888;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .show-jackpot {
            display: block !important;
            background-image: linear-gradient(45deg, #ff0000, #ff8000, #ffff00, #00ff00, #0000ff, #4b0082, #ee82ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulse 1s infinite alternate;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Loading Engine...</div>
    
    <div id="titleScreen">
        <div class="title-text">NIMIDICE</div>
        <div class="start-text">Tap or Press Any Key</div>
    </div>

    <div id="resultText"></div>
    
    <div id="ui">
        <button id="rollBtn">ROLL DICE</button>
        <div id="instruction">クリックでサイコロをホールド / 解除</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // 変更: 初期化時にアスペクト比を計算し、縦画面なら視野角(FOV)を広げて全体を映す
        const initialAspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.PerspectiveCamera(Math.max(45, 45 / initialAspect), initialAspect, 0.1, 100);
        camera.position.set(0, 25, 16);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(5, 30, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- 物理エンジンのセットアップ ---
        const world = new CANNON.World();
        world.gravity.set(0, -15, 0);
        world.solver.iterations = 50; 
        world.solver.tolerance = 0.001;
        
        const defaultMat = new CANNON.Material();
        const contactMat = new CANNON.ContactMaterial(defaultMat, defaultMat, {
            friction: 0.6,
            restitution: 0.2 
        });
        world.addContactMaterial(contactMat);

        // --- 視覚的な器 ---
        const bowlGroup = new THREE.Group();

        const outerGeo = new THREE.CylinderGeometry(16, 12, 8, 64, 1, true);
        const outerMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide, roughness: 0.7 });
        const outerMesh = new THREE.Mesh(outerGeo, outerMat);
        outerMesh.position.y = 4;
        bowlGroup.add(outerMesh);

        const innerGeo = new THREE.CylinderGeometry(15.5, 11.5, 8, 64, 1, true);
        const innerMat = new THREE.MeshStandardMaterial({ color: 0x991111, side: THREE.DoubleSide, roughness: 0.5 });
        const innerMesh = new THREE.Mesh(innerGeo, innerMat);
        innerMesh.position.y = 4;
        bowlGroup.add(innerMesh);

        const innerBotGeo = new THREE.CircleGeometry(11.5, 64);
        const innerBotMesh = new THREE.Mesh(innerBotGeo, innerMat);
        innerBotMesh.rotation.x = -Math.PI / 2;
        innerBotMesh.position.y = 0.1;
        innerBotMesh.receiveShadow = true;
        bowlGroup.add(innerBotMesh);

        const outerBotGeo = new THREE.CircleGeometry(12, 64);
        const outerBotMesh = new THREE.Mesh(outerBotGeo, outerMat);
        outerBotMesh.rotation.x = Math.PI / 2;
        outerBotMesh.position.y = 0;
        outerBotMesh.castShadow = true;
        bowlGroup.add(outerBotMesh);

        const rimGeo = new THREE.TorusGeometry(15.75, 0.25, 16, 64);
        const rimMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 });
        const rimMesh = new THREE.Mesh(rimGeo, rimMat);
        rimMesh.rotation.x = Math.PI / 2;
        rimMesh.position.y = 8;
        bowlGroup.add(rimMesh);

        scene.add(bowlGroup);

        // --- 物理的な器 ---
        function createPhysicalBowl(targetWorld, mat) {
            const floorBody = new CANNON.Body({
                type: CANNON.Body.STATIC,
                shape: new CANNON.Plane(),
                material: mat
            });
            floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            floorBody.position.set(0, 0.3, 0); 
            targetWorld.addBody(floorBody);

            const ceilingBody = new CANNON.Body({
                type: CANNON.Body.STATIC,
                shape: new CANNON.Plane(),
                material: mat
            });
            ceilingBody.quaternion.setFromEuler(Math.PI / 2, 0, 0);
            ceilingBody.position.set(0, 18, 0);
            targetWorld.addBody(ceilingBody);

            const segments = 32;
            const r_bottom = 10.5; 
            const r_top = 14.5;    
            const y_bottom = 0.0;
            const y_top = 8.0;
            
            const slope_angle = Math.atan2(r_top - r_bottom, y_top - y_bottom);
            const box_h = 40; 
            const box_d = 5;  
            
            const r_center = r_bottom + (box_h / 2) * Math.sin(slope_angle) + (box_d / 2) * Math.cos(slope_angle);
            const y_center = y_bottom + (box_h / 2) * Math.cos(slope_angle) - (box_d / 2) * Math.sin(slope_angle);
            const box_w = (2 * Math.PI * r_center / segments) * 1.1; 

            for (let i = 0; i < segments; i++) {
                const angle = i * Math.PI * 2 / segments;
                const wallBody = new CANNON.Body({
                    type: CANNON.Body.STATIC,
                    shape: new CANNON.Box(new CANNON.Vec3(box_w / 2, box_h / 2, box_d / 2)),
                    material: mat
                });
                
                const qX = new CANNON.Quaternion();
                qX.setFromEuler(slope_angle, 0, 0);
                
                const qY = new CANNON.Quaternion();
                qY.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), angle);
                
                wallBody.quaternion = qY.mult(qX);
                wallBody.position.set(
                    r_center * Math.sin(angle),
                    y_center,
                    r_center * Math.cos(angle)
                );
                
                targetWorld.addBody(wallBody);
            }
        }
        createPhysicalBowl(world, defaultMat);

        // --- サイコロの構築 ---
        const characters = ['に', 'い', 'み', 'と', 'も', 'や'];
        const charOrder = { 'に': 1, 'い': 2, 'み': 3, 'と': 4, 'も': 5, 'や': 6 };

        function createDiceTexture(char) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, 256, 256);
            ctx.lineWidth = 15;
            ctx.strokeStyle = '#cccccc';
            ctx.strokeRect(0, 0, 256, 256);

            ctx.fillStyle = char === 'に' ? '#cc0000' : '#111111';
            ctx.font = 'bold 150px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, 128, 128 + 10);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const baseDiceMaterials = characters.map(char => {
            const mat = new THREE.MeshStandardMaterial({ map: createDiceTexture(char), roughness: 0.3 });
            mat.userData = { char: char };
            return mat;
        });

        const diceList = [];
        const diceSize = 1.8; 
        const diceGeo = new THREE.BoxGeometry(diceSize, diceSize, diceSize);
        const diceShape = new CANNON.Box(new CANNON.Vec3(diceSize / 2, diceSize / 2, diceSize / 2));

        for (let i = 0; i < 6; i++) {
            const initialMats = [...baseDiceMaterials].sort(() => Math.random() - 0.5);
            const mesh = new THREE.Mesh(diceGeo, initialMats);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const body = new CANNON.Body({
                mass: 2,
                shape: diceShape,
                material: defaultMat
            });
            body.angularDamping = 0.1;
            
            // 初期の配置：器の中にばらけさせて自然落下させる
            body.position.set(
                (Math.random() - 0.5) * 4,
                2 + i * 1.2,
                (Math.random() - 0.5) * 4
            );
            body.quaternion.setFromEuler(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            
            world.addBody(body);

            diceList.push({ mesh, body, isHeld: false });
        }

        // --- ゲーム進行のフラグとUI要素 ---
        let isEngineLoaded = false;
        let isGameStarted = false;
        let isRolling = false;
        let resultEvaluated = true; // 初回は判定をスキップする
        
        const titleScreenEl = document.getElementById('titleScreen');
        const resultTextEl = document.getElementById('resultText');
        const uiEl = document.getElementById('ui');

        // 任意のキー、マウスクリック、スマホのタップでゲーム開始
        function startGame() {
            if (isEngineLoaded && !isGameStarted) {
                isGameStarted = true;
                titleScreenEl.style.opacity = '0';
                
                setTimeout(() => {
                    titleScreenEl.style.display = 'none';
                    uiEl.style.display = 'block';
                }, 500);
            }
        }
        window.addEventListener('keydown', startGame);
        window.addEventListener('mousedown', startGame);
        window.addEventListener('touchstart', startGame);

        // サイコロを振る処理（ランダムオンリー）
        function rollDice() {
            if (!isGameStarted) return;
            
            isRolling = true;
            resultEvaluated = false;
            resultTextEl.className = ''; // 以前の表示を消す

            diceList.forEach((dice, index) => {
                if (!dice.isHeld) {
                    // 通常のランダム再構築
                    dice.mesh.material = [...baseDiceMaterials].sort(() => Math.random() - 0.5);

                    // 初期位置へリセットし、力を加える
                    dice.body.position.set(
                        (Math.random() - 0.5) * 6,
                        4 + Math.random() * 2 + index * 1,
                        (Math.random() - 0.5) * 6
                    );
                    dice.body.velocity.set(0, 0, 0);
                    dice.body.angularVelocity.set(
                        (Math.random() - 0.5) * 20,
                        (Math.random() - 0.5) * 20,
                        (Math.random() - 0.5) * 20
                    );
                    
                    const impulse = new CANNON.Vec3(
                        (Math.random() - 0.5) * 5,
                        -10,
                        (Math.random() - 0.5) * 5
                    );
                    dice.body.applyImpulse(impulse, new CANNON.Vec3(0, 0, 0));
                }
            });
        }

        document.getElementById('rollBtn').addEventListener('click', rollDice);

        // --- 出目判定とホールド機能 ---
        function getTopFaceMaterialIndex(mesh) {
            const up = new THREE.Vector3(0, 1, 0);
            const matrix = new THREE.Matrix4().extractRotation(mesh.matrixWorld);
            const normals = [
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(0, 0, -1)
            ].map(v => v.applyMatrix4(matrix));

            let maxDot = -Infinity;
            let topIndex = -1;
            for (let i = 0; i < 6; i++) {
                const dot = up.dot(normals[i]);
                if (dot > maxDot) {
                    maxDot = dot;
                    topIndex = i;
                }
            }
            return topIndex;
        }

        function evaluateResult() {
            const resultSet = new Set();
            const resultChars = [];

            diceList.forEach(dice => {
                const topFaceIndex = getTopFaceMaterialIndex(dice.mesh);
                const mat = dice.mesh.material[topFaceIndex];
                resultSet.add(mat.uuid);
                resultChars.push(mat.userData.char);
            });

            // "にいみともや" の順にソート
            resultChars.sort((a, b) => charOrder[a] - charOrder[b]);
            resultTextEl.innerText = resultChars.join('');

            // すべて異なるマテリアルならジャックポット
            if (resultSet.size === 6) {
                resultTextEl.classList.add('show-jackpot');
            } else {
                resultTextEl.classList.add('show-gray');
            }
            
            resultEvaluated = true;
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (!isGameStarted || event.target.id === 'rollBtn') return;	

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(diceList.map(d => d.mesh));

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                const dice = diceList.find(d => d.mesh === clickedMesh);
                
                dice.isHeld = !dice.isHeld;
                
                if (dice.isHeld) {
                    dice.mesh.material.forEach(m => m.emissive.setHex(0x555500));
                } else {
                    dice.mesh.material.forEach(m => m.emissive.setHex(0x000000));
                }
            }
        });

        // 変更: ウィンドウのリサイズ時にもアスペクト比を計算し、視野角をリアルタイム更新する
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;
            camera.fov = Math.max(45, 45 / aspect);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- メインループ ---
        const timeStep = 1 / 60;
        let lastCallTime = performance.now();
        
        // ロード完了処理
        document.getElementById('loading').style.display = 'none';
        titleScreenEl.style.display = 'flex'; // タイトル画面を表示
        isEngineLoaded = true;
        
        // 初期状態ではサイコロは振らず、器の中に落下して静止するのを待つだけ

        function animate(time) {
            requestAnimationFrame(animate);
            
            const deltaTime = (time - lastCallTime) / 1000;
            lastCallTime = time;
            
            world.step(timeStep, deltaTime, 3);

            let allStopped = true;

            diceList.forEach(dice => {
                if (!dice.isHeld || dice.body.velocity.lengthSquared() > 0.05) {
                    dice.mesh.position.copy(dice.body.position);
                    dice.mesh.quaternion.copy(dice.body.quaternion);
                }

                if (dice.body.velocity.lengthSquared() > 0.02 || dice.body.angularVelocity.lengthSquared() > 0.02) {
                    allStopped = false;
                }
            });

            // 振られている途中で、すべてが静止したら結果を表示
            if (isRolling && allStopped && !resultEvaluated) {
                isRolling = false;
                evaluateResult();
            }

            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
