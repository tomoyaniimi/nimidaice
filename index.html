<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIMIDICE - 3D Dice Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
            user-select: none;
            touch-action: none;
        }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 20px;
            z-index: 200;
        }
        
        /* タイトル画面 */
        #titleScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(26, 26, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
            display: none; 
        }
        .title-text {
            font-size: clamp(40px, 12vw, 100px);
            color: #fff;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            text-align: center;
            width: 90%;
            text-shadow: 0 0 20px rgba(217, 83, 79, 0.8);
        }
        .start-text {
            font-size: clamp(16px, 4vw, 24px);
            color: #ccc;
            letter-spacing: 1px;
            animation: blink 1.5s infinite;
        }

        #ui {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            display: none;
            z-index: 50;
            width: 100%;
        }
        #rollBtn {
            pointer-events: auto;
            padding: 15px 40px;
            font-size: clamp(16px, 5vw, 22px);
            font-weight: bold;
            color: #fff;
            background-color: #d9534f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: background-color 0.2s;
        }
        #rollBtn:active { transform: scale(0.95); }
        #instruction {
            color: #ccc;
            margin-top: 10px;
            font-size: clamp(12px, 3.5vw, 16px);
        }

        /* 結果表示 */
        #resultText {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: clamp(40px, 15vw, 100px);
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            display: none;
            z-index: 50;
            width: 90%;
            text-align: center;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes popIn {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
            100% { filter: drop-shadow(0 0 25px rgba(255,255,0,1)); }
        }
        .show-gray {
            display: block !important;
            color: #888888;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .show-jackpot {
            display: block !important;
            background-image: linear-gradient(45deg, #ff0000, #ff8000, #ffff00, #00ff00, #0000ff, #4b0082, #ee82ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulse 1s infinite alternate;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Loading Engine...</div>
    
    <div id="titleScreen">
        <div class="title-text">NIMIDICE</div>
        <div class="start-text">Tap or Press Any Key</div>
    </div>

    <div id="resultText"></div>
    
    <div id="ui">
        <button id="rollBtn">ROLL DICE</button>
        <div id="instruction">タップしてサイコロをホールド</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // カメラ位置のレスポンシブ調整
        function adjustCamera() {
            const aspect = window.innerWidth / window.innerHeight;
            if (aspect < 1) {
                // 縦長画面（スマホ）
                camera.position.set(0, 35, 20);
                camera.fov = 55;
            } else {
                // 横長画面（PC）
                camera.position.set(0, 25, 16);
                camera.fov = 45;
            }
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', adjustCamera);
        adjustCamera();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 40, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- 物理エンジンのセットアップ ---
        const world = new CANNON.World();
        function setupPhysicsWorld(targetWorld) {
            targetWorld.gravity.set(0, -20, 0); 
            targetWorld.solver.iterations = 30;
            const defaultMat = new CANNON.Material();
            const contactMat = new CANNON.ContactMaterial(defaultMat, defaultMat, {
                friction: 0.5, restitution: 0.2 
            });
            targetWorld.addContactMaterial(contactMat);
            return defaultMat;
        }
        const mainDefaultMat = setupPhysicsWorld(world);

        // --- 器の作成 ---
        const bowlGroup = new THREE.Group();
        const bowlInnerColor = 0x991111;
        const bowlOuterColor = 0x111111;

        const outerGeo = new THREE.CylinderGeometry(16, 12, 8, 48, 1, true);
        const outerMat = new THREE.MeshStandardMaterial({ color: bowlOuterColor, side: THREE.DoubleSide });
        const outerMesh = new THREE.Mesh(outerGeo, outerMat);
        outerMesh.position.y = 4;
        bowlGroup.add(outerMesh);

        const innerGeo = new THREE.CylinderGeometry(15.5, 11.5, 8, 48, 1, true);
        const innerMat = new THREE.MeshStandardMaterial({ color: bowlInnerColor, side: THREE.DoubleSide });
        const innerMesh = new THREE.Mesh(innerGeo, innerMat);
        innerMesh.position.y = 4;
        bowlGroup.add(innerMesh);

        const innerBotGeo = new THREE.CircleGeometry(11.5, 48);
        const innerBotMesh = new THREE.Mesh(innerBotGeo, innerMat);
        innerBotMesh.rotation.x = -Math.PI / 2;
        innerBotMesh.position.y = 0.1;
        innerBotMesh.receiveShadow = true;
        bowlGroup.add(innerBotMesh);

        const rimGeo = new THREE.TorusGeometry(15.75, 0.25, 16, 64);
        const rimMat = new THREE.MeshStandardMaterial({ color: bowlOuterColor });
        const rimMesh = new THREE.Mesh(rimGeo, rimMat); // 修正箇所: const を追加しました
        rimMesh.rotation.x = Math.PI / 2;
        rimMesh.position.y = 8;
        bowlGroup.add(rimMesh);
        scene.add(bowlGroup);

        // --- 物理的な器（見えない壁） ---
        function createPhysicalBowl(targetWorld, mat) {
            const floorBody = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane(), material: mat });
            floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            floorBody.position.set(0, 0.3, 0); 
            targetWorld.addBody(floorBody);

            const ceilingBody = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane(), material: mat });
            ceilingBody.quaternion.setFromEuler(Math.PI / 2, 0, 0);
            ceilingBody.position.set(0, 30, 0);
            targetWorld.addBody(ceilingBody);

            const segments = 24;
            const r_bottom = 10.5; 
            const r_top = 14.5;    
            const wall_height = 60; 
            const angleStep = (Math.PI * 2) / segments;

            for (let i = 0; i < segments; i++) {
                const angle = i * angleStep;
                const wallBody = new CANNON.Body({
                    type: CANNON.Body.STATIC,
                    shape: new CANNON.Box(new CANNON.Vec3(4, wall_height / 2, 2)),
                    material: mat
                });
                const slope = Math.atan2(r_top - r_bottom, 8);
                const qX = new CANNON.Quaternion(); qX.setFromEuler(slope, 0, 0);
                const qY = new CANNON.Quaternion(); qY.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), angle);
                wallBody.quaternion = qY.mult(qX);
                wallBody.position.set(Math.sin(angle) * 14, wall_height / 2, Math.cos(angle) * 14);
                targetWorld.addBody(wallBody);
            }
        }
        createPhysicalBowl(world, mainDefaultMat);

        // --- サイコロ ---
        const characters = ['に', 'も', 'い', 'や', 'み', 'と'];
        const charOrder = { 'に': 1, 'も': 2, 'い': 3, 'や': 4, 'み': 5, 'と': 6 };

        function createDiceTexture(char) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fefefe';
            ctx.fillRect(0, 0, 256, 256);
            ctx.lineWidth = 15; ctx.strokeStyle = '#ddd'; ctx.strokeRect(0, 0, 256, 256);
            ctx.fillStyle = char === 'に' ? '#cc0000' : '#1a1a1a';
            ctx.font = 'bold 160px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(char, 128, 138);
            return new THREE.CanvasTexture(canvas);
        }

        const baseDiceMaterials = characters.map(char => {
            const mat = new THREE.MeshStandardMaterial({ map: createDiceTexture(char), roughness: 0.3 });
            mat.userData = { char: char };
            return mat;
        });

        const diceList = [];
        const diceSize = 1.35;
        const diceGeo = new THREE.BoxGeometry(diceSize, diceSize, diceSize);
        const diceShape = new CANNON.Box(new CANNON.Vec3(diceSize/2, diceSize/2, diceSize/2));

        for (let i = 0; i < 6; i++) {
            const initialMats = [...baseDiceMaterials].sort(() => Math.random() - 0.5);
            const mesh = new THREE.Mesh(diceGeo, initialMats);
            mesh.castShadow = mesh.receiveShadow = true;
            scene.add(mesh);
            const body = new CANNON.Body({ mass: 2, shape: diceShape, material: mainDefaultMat });
            body.angularDamping = 0.2;
            body.position.set((Math.random()-0.5)*4, 2 + i*1.2, (Math.random()-0.5)*4);
            body.quaternion.setFromEuler(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
            world.addBody(body);
            diceList.push({ mesh, body, isHeld: false });
        }

        // --- ゲーム管理 ---
        let isEngineLoaded = false, isGameStarted = false, isRolling = false, resultEvaluated = true, rollCount = 0;
        const titleScreenEl = document.getElementById('titleScreen'), resultTextEl = document.getElementById('resultText'), uiEl = document.getElementById('ui');

        function startGame() {
            if (isEngineLoaded && !isGameStarted) {
                isGameStarted = true;
                titleScreenEl.style.opacity = '0';
                setTimeout(() => { titleScreenEl.style.display = 'none'; uiEl.style.display = 'block'; }, 500);
            }
        }
        window.addEventListener('keydown', startGame);
        window.addEventListener('pointerdown', (e) => { if(titleScreenEl.style.display !== 'none') startGame(); });

        function rollDice() {
            if (!isGameStarted || isRolling) return;
            isRolling = true; resultEvaluated = false; rollCount++;
            resultTextEl.className = '';

            // 8回目ジャックポット予測
            let predictedFaces = [], availableChars = [...characters];
            if (rollCount === 8) {
                diceList.forEach(d => {
                    if (d.isHeld) {
                        const char = d.mesh.material[getTopIndex(d.mesh)].userData.char;
                        const idx = availableChars.indexOf(char);
                        if (idx !== -1) availableChars.splice(idx, 1);
                    }
                });
                availableChars.sort(() => Math.random() - 0.5);
                const pWorld = new CANNON.World();
                const pMat = setupPhysicsWorld(pWorld);
                createPhysicalBowl(pWorld, pMat);
                const pBodies = diceList.map((d, index) => {
                    const b = new CANNON.Body({ mass: 2, shape: diceShape, material: pMat });
                    if(!d.isHeld) {
                        b.position.set((Math.random()-0.5)*6, 8+index*2, (Math.random()-0.5)*6);
                        b.quaternion.setFromEuler(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                        b.angularVelocity.set((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
                        b.applyImpulse(new CANNON.Vec3((Math.random()-0.5)*5, -12, (Math.random()-0.5)*5), new CANNON.Vec3(0,0,0));
                    } else {
                        b.position.copy(d.body.position); b.quaternion.copy(d.body.quaternion);
                    }
                    pWorld.addBody(b); return b;
                });
                for(let i=0; i<360; i++) pWorld.step(1/60);
                predictedFaces = pBodies.map(b => {
                    const up = new CANNON.Vec3(0, 1, 0);
                    let maxD = -Infinity, top = -1;
                    const normals = [new CANNON.Vec3(1,0,0), new CANNON.Vec3(-1,0,0), new CANNON.Vec3(0,1,0), new CANNON.Vec3(0,-1,0), new CANNON.Vec3(0,0,1), new CANNON.Vec3(0,0,-1)];
                    normals.forEach((n, idx) => {
                        const wn = new CANNON.Vec3(); b.quaternion.vmult(n, wn);
                        const d = wn.dot(up); if(d > maxD){ maxD = d; top = idx; }
                    });
                    return top;
                });
                
                diceList.forEach((dice, index) => {
                    if(!dice.isHeld) {
                        const target = availableChars.pop() || characters[0];
                        const newMats = [];
                        for(let f=0; f<6; f++) {
                            newMats.push(f === predictedFaces[index] ? baseDiceMaterials.find(m=>m.userData.char===target) : baseDiceMaterials[Math.floor(Math.random()*6)]);
                        }
                        dice.mesh.material = newMats;
                        dice.body.position.copy(pBodies[index].position);
                        dice.body.quaternion.copy(pBodies[index].quaternion);
                        dice.body.velocity.copy(pBodies[index].velocity);
                        dice.body.angularVelocity.copy(pBodies[index].angularVelocity);
                    }
                });
            } else {
                diceList.forEach((dice, index) => {
                    if (!dice.isHeld) {
                        dice.mesh.material = [...baseDiceMaterials].sort(() => Math.random() - 0.5);
                        dice.body.position.set((Math.random()-0.5)*6, 8+index*2, (Math.random()-0.5)*6);
                        dice.body.velocity.set(0,0,0);
                        dice.body.angularVelocity.set((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
                        dice.body.applyImpulse(new CANNON.Vec3((Math.random()-0.5)*5, -12, (Math.random()-0.5)*5), new CANNON.Vec3(0,0,0));
                    }
                });
            }
        }
        document.getElementById('rollBtn').addEventListener('pointerdown', rollDice);

        function getTopIndex(mesh) {
            const up = new THREE.Vector3(0, 1, 0), matrix = new THREE.Matrix4().extractRotation(mesh.matrixWorld);
            const normals = [new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0), new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1)].map(v => v.applyMatrix4(matrix));
            let maxD = -Infinity, top = -1;
            normals.forEach((n, i) => { const d = up.dot(n); if(d > maxD){ maxD = d; top = i; } });
            return top;
        }

        function evaluate() {
            const results = [], resultSet = new Set();
            diceList.forEach(d => {
                const idx = getTopIndex(d.mesh), mat = d.mesh.material[idx];
                resultSet.add(mat.uuid); results.push(mat.userData.char);
            });
            results.sort((a,b) => charOrder[a] - charOrder[b]);
            resultTextEl.innerText = results.join('');
            resultTextEl.className = (resultSet.size === 6) ? 'show-jackpot' : 'show-gray';
            resultEvaluated = true;
        }

        const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
        window.addEventListener('pointerdown', (e) => {
            if (!isGameStarted || e.target.id === 'rollBtn') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(diceList.map(d => d.mesh));
            if (intersects.length > 0) {
                const d = diceList.find(dice => dice.mesh === intersects[0].object);
                d.isHeld = !d.isHeld;
                d.mesh.material.forEach(m => m.emissive.setHex(d.isHeld ? 0x444400 : 0x000000));
            }
        });

        const timeStep = 1 / 60;
        let lastTime = performance.now(), accumulator = 0;
        document.getElementById('loading').style.display = 'none';
        titleScreenEl.style.display = 'flex'; isEngineLoaded = true;

        function animate(time) {
            requestAnimationFrame(animate);
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time; accumulator += dt;
            while (accumulator >= timeStep) { world.step(timeStep); accumulator -= timeStep; }
            let allStopped = true;
            diceList.forEach(d => {
                d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion);
                if (d.body.velocity.lengthSquared() > 0.05 || d.body.angularVelocity.lengthSquared() > 0.05) allStopped = false;
            });
            if (isRolling && allStopped && !resultEvaluated) { isRolling = false; evaluate(); }
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
